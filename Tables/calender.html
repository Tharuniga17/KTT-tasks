<!DOCTYPE html>
<html lang = "en">
    <head>
        <style>
        table,
        tr,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
            text-align: center;
            padding: 10px;
            border-style: none;
        }
        tr:first-child{
            background-color: violet;
        }
        </style>
    </head>

        <table>
            <caption>Calender 2026</caption>
            <tr>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thurs</th>

            <tr>

                <td>3</td>

            </tr>

                <td>10</td>
                <td>11</td>
                <td>12</td>
                
                

            </tr>
            <tr>
                <td>13</td>
                <td>14</td>
                <td>15</td>
                <td>16</td>
                <td>17</td>
                <td>18</td>
              
                

            </tr>

                <td>19</td>
                <td>20</td>

                <td>22</td>

                <td>24</td>
               
                

            </tr>
        </table>
    </body>
</html>
