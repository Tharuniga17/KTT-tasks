<!DOCTYPE html>
<html>
    <head>
        <style>
            .container{
                display:grid;
                grid-template-columns: auto auto auto;
                gap:10px
            }
            .box{
                background-color: lawngreen;
                padding: 20px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">5</div>
            <div class="box">9</div>
        </div>
    </body>
</html>
