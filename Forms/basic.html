<!DOCTYPE html>
<html>
    <head>
        <form>
            <fieldset>
            <legend>Employee details</legend>
            <label for="fname">First name:</label><br>
            <input type="text" id="fname" ><br>
            <label for="lname">Last name:</label><br>
            <input type="text" id="lname"><br>
            <input type="radio" name="gender" value="Male">Male
            <input type="radio" name="gender" value="Female">Female<br>
            <input type="checkbox" name="idly" value="idly" readonly>Idly
            <input type="checkbox" name="dosa" value="dosa">Dosa<br>
            <label for="course">choose a course</label><br>
            <select id="course" name="course">
                <option>ECE</option>
                <option>CSE</option>
                <option>EEE</option>
            </select>
            <label for="email">Enter ur email</label>
            <input type="email" name="email" required>
            </fieldset>
        </form>
        <form>
            <fieldset>
                <legend>Personal Details</legend>
                <label for="fname">Name:</label>
                <input type="text" name="name" required><br>
                <label for="email">Email:</label>
                <input type="email" name="email" required><br>
                <label for="age">Age:</label>
                <input type="number" name="age" min="18" max="60"><br>
                <label for="password">Password:</label>
                <input type="password" name="password" minlength="6"><br><br>
                <input type="file" name="file" accept=".pdf"><br>
                <textarea rows="4" cols="20">Message</textarea><br>
                <button value="submit">Submit</button>
            </fieldset>
        </form>
    </head>
</html>
